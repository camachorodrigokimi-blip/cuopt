syntax = "proto3";

package cuopt.remote;

// Import the existing message definitions
import "cuopt_remote.proto";

// =============================================================================
// gRPC Service Definition
// =============================================================================

service CuOptRemoteService {
  // -------------------------
  // Async Job Management
  // -------------------------

  // Submit a new LP or MIP solve job (returns immediately with job_id).
  // Used for problems whose serialized SubmitJobRequest fits within the
  // gRPC max message size (256 MiB default, configurable per-side).
  // Larger problems use the chunked upload path below; see ArrayChunk.
  rpc SubmitJob(SubmitJobRequest) returns (SubmitJobResponse);

  // -------------------------
  // Chunked Array Upload (for large problems exceeding unary message limit)
  // -------------------------

  // Start a chunked upload session. Sends problem metadata (scalars, settings, string arrays)
  // in the header. Returns an upload_id for subsequent chunk calls.
  rpc StartChunkedUpload(StartChunkedUploadRequest) returns (StartChunkedUploadResponse);

  // Send one chunk of array data. Each chunk carries a slice of one numeric array,
  // identified by ArrayFieldId. The server accumulates chunks by upload_id.
  rpc SendArrayChunk(SendArrayChunkRequest) returns (SendArrayChunkResponse);

  // Finalize a chunked upload and submit the assembled problem as a job.
  // Returns the job_id, same as SubmitJob.
  rpc FinishChunkedUpload(FinishChunkedUploadRequest) returns (SubmitJobResponse);

  // -------------------------
  // Job Status and Results
  // -------------------------

  // Check the status of a submitted job
  rpc CheckStatus(StatusRequest) returns (StatusResponse);

  // Get the result of a completed job (unary, for results that fit in one message)
  rpc GetResult(GetResultRequest) returns (ResultResponse);

  // -------------------------
  // Chunked Result Download (for large results exceeding unary message limit)
  // -------------------------

  // Start a chunked download session. Returns result metadata (scalars, enums, strings)
  // and array descriptors (field_id, total_elements, element_size) for the caller to
  // fetch array data in subsequent GetResultChunk calls.
  rpc StartChunkedDownload(StartChunkedDownloadRequest) returns (StartChunkedDownloadResponse);

  // Get one chunk of result array data. Each call returns a slice of one array,
  // identified by ResultFieldId. The client controls pacing.
  rpc GetResultChunk(GetResultChunkRequest) returns (GetResultChunkResponse);

  // Finalize a chunked download session and release server-side state.
  rpc FinishChunkedDownload(FinishChunkedDownloadRequest) returns (FinishChunkedDownloadResponse);

  // Delete a result from server memory
  rpc DeleteResult(DeleteRequest) returns (DeleteResponse);

  // Cancel a queued or running job
  rpc CancelJob(CancelRequest) returns (CancelResponse);

  // Wait for a job to complete (blocking, returns status only - use GetResult for solution)
  rpc WaitForCompletion(WaitRequest) returns (WaitResponse);

  // -------------------------
  // Log Streaming
  // -------------------------

  // Stream log messages as they are produced (server-side streaming)
  rpc StreamLogs(StreamLogsRequest) returns (stream LogMessage);

  // -------------------------
  // Incumbent Solutions
  // -------------------------

  // Get any available incumbent solutions since a given index.
  rpc GetIncumbents(IncumbentRequest) returns (IncumbentResponse);
}

// =============================================================================
// Request Messages
// =============================================================================

// Request to submit a new job
message SubmitJobRequest {
  oneof job_data {
    SolveLPRequest lp_request = 1;
    SolveMIPRequest mip_request = 2;
  }
}

// Response when job is submitted
message SubmitJobResponse {
  string job_id = 1;           // Unique job identifier
  string message = 2;          // Optional message
}

// =============================================================================
// Chunked Array Upload (for problems exceeding unary message limit)
// =============================================================================

// Header for chunked array uploads: carries scalars, settings, and small string arrays.
// Numeric arrays are sent separately via SendArrayChunk RPCs.
message ChunkedProblemHeader {
  RequestHeader header = 1;

  // Problem scalars
  bool maximize = 2;
  double objective_scaling_factor = 3;
  double objective_offset = 4;
  string problem_name = 5;
  string objective_name = 6;
  ProblemCategory problem_category = 9;

  // String arrays (included here since they are rarely the size bottleneck)
  repeated string variable_names = 7;
  repeated string row_names = 8;

  // Settings (one of LP or MIP)
  oneof settings {
    PDLPSolverSettings lp_settings = 20;
    MIPSolverSettings mip_settings = 21;
  }

  // MIP-specific
  bool enable_incumbents = 30;

  // Per-entry scalars for repeated_messages on OptimizationProblem (e.g. QC
  // rows).  The arrays inside each entry are unbounded in size and travel
  // separately via container-keyed ArrayChunks
  // (container_field_num=25, container_index=<entry idx>, field_id=<0..4>);
  // see field_registry.yaml and the ArrayChunk message above.  Field number
  // matches the corresponding `repeated QuadraticConstraint quadratic_constraints`
  // field on OptimizationProblem so client/server share the same tag.
  repeated QuadraticConstraint quadratic_constraints = 25;
}

// A chunk of typed array data for large problem transfers.
// Each chunk carries a slice of one array field. The chunk identifies its
// target array via (container_field_num, container_index, field_id):
//
//   - Top-level array (default): container_field_num and container_index are
//     unset.  field_id is interpreted as an `ArrayFieldId` enum value (e.g.,
//     FIELD_A_VALUES).  See ArrayFieldId in cuopt_remote_data.proto for the
//     full set of values; each entry there carries a comment describing the
//     raw byte layout the server expects in `data`.
//
//   - Array inside a repeated nested message: container_field_num is the
//     parent message's field_num for the repeated_messages entry (e.g. 25 for
//     OptimizationProblem.quadratic_constraints), container_index is the
//     0-based element index within that repeated field, and field_id is
//     interpreted relative to the container's own array namespace.  These
//     container-relative ids are published as a nested `ArrayId` enum on
//     each repeated message type — e.g. QuadraticConstraint.LINEAR_VALUES —
//     so external clients should reference the named enum value rather than
//     the bare integer.
//
// `data` carries native-endian raw element bytes (memcpy'd directly from the
// client's contiguous buffer), NOT a protobuf-encoded value.  total_elements
// counts logical elements, so `data.size() == chunk_elements * element_size`.
// All officially supported cuOpt platforms are little-endian; a from-scratch
// client on a big-endian host must byte-swap doubles/int32s into LE before
// populating `data`.
//
// The server pre-allocates the target array on the first chunk (using
// total_elements) and copies each chunk's data at the given element_offset.
//
// Note for custom clients: this chunked path is required to escape
// protobuf's ~2 GiB single-message ceiling, but it's also the faster
// path on big problems — 16 MiB chunks fit in CPU L3 and consecutive
// SendArrayChunk RPCs pipeline naturally, where a single
// multi-hundred-MB unary message blows L3 and serializes.  A custom
// client that wants to skip chunking entirely can raise
// `--max-message-mb` (server) and `max_message_bytes` (client) up to
// the ~2 GiB clamp and send problems via unary `SubmitJob`, at a small
// throughput cost on the largest problems.  See GRPC_INTERFACE.md.
message ArrayChunk {
  int32 field_id = 1;          // ArrayFieldId for top-level, or container-relative ArrayId
  int64 element_offset = 2;    // Element index offset within the array
  int64 total_elements = 3;    // Total elements in the complete array (for pre-allocation)
  bytes data = 4;              // Raw native-endian element bytes; see message-level doc above

  // For chunks targeting an array inside a repeated nested message (e.g. a
  // single QuadraticConstraint's linear_values).  Both unset (proto3
  // has_*()-style presence) means a top-level chunk — existing semantics.
  // Both must be set or both unset; partial presence is rejected with
  // INVALID_ARGUMENT (handlers must not silently default container_index to 0).
  optional int32 container_field_num = 5;
  optional int32 container_index = 6;
}

// Start a chunked upload: sends problem metadata and settings.
// Problem category (LP/MIP) is derived from problem_header.header.problem_category.
message StartChunkedUploadRequest {
  ChunkedProblemHeader problem_header = 1;
}

message StartChunkedUploadResponse {
  string upload_id = 1;
  int64 max_message_bytes = 2;  // Server gRPC max message size hint
}

// Send one array chunk as part of an in-progress chunked upload.
message SendArrayChunkRequest {
  string upload_id = 1;
  ArrayChunk chunk = 2;
}

message SendArrayChunkResponse {
  string upload_id = 1;
  int64 chunks_received = 2;  // Running count of chunks received for this upload
}

// Finalize a chunked upload and submit the assembled problem as a job.
message FinishChunkedUploadRequest {
  string upload_id = 1;
}

// Request to check job status
message StatusRequest {
  string job_id = 1;
}

// Request to get result
message GetResultRequest {
  string job_id = 1;
}

// ResultArrayDescriptor and ChunkedResultHeader are defined in
// cuopt_remote_data.proto (auto-generated from field_registry.yaml).

message StartChunkedDownloadRequest {
  string job_id = 1;
}

message StartChunkedDownloadResponse {
  string download_id = 1;
  ChunkedResultHeader header = 2;
  int64 max_message_bytes = 3;
}

message GetResultChunkRequest {
  string download_id = 1;
  ResultFieldId field_id = 2;
  int64 element_offset = 3;
  int64 max_elements = 4;
}

message GetResultChunkResponse {
  string download_id = 1;
  ResultFieldId field_id = 2;
  int64 element_offset = 3;
  int64 elements_in_chunk = 4;
  bytes data = 5;
}

message FinishChunkedDownloadRequest {
  string download_id = 1;
}

message FinishChunkedDownloadResponse {
  string download_id = 1;
}

// Request to delete result
message DeleteRequest {
  string job_id = 1;
}

// DeleteResponse is defined in cuopt_remote.proto (imported above)

// Request to cancel job
message CancelRequest {
  string job_id = 1;
}

// CancelResponse is defined in cuopt_remote.proto (imported above)

// Request to wait for completion (blocking)
message WaitRequest {
  string job_id = 1;
}

// Response for wait (status only, no solution - use GetResult afterward)
message WaitResponse {
  JobStatus job_status = 1;
  string message = 2;
  int64 result_size_bytes = 3;  // Size of result payload when COMPLETED
}

// Request to stream logs
message StreamLogsRequest {
  string job_id = 1;
  int64 from_byte = 2;         // Optional: start from this byte offset
}

// Individual log message (streamed)
message LogMessage {
  string line = 1;             // Single log line
  int64 byte_offset = 2;       // Byte offset of this line in log file
  bool job_complete = 3;       // True if this is the last message (job done)
}

// =============================================================================
// Incumbent Solutions
// =============================================================================

message IncumbentRequest {
  string job_id = 1;
  int64 from_index = 2;        // Return incumbents starting from this index
  int32 max_count = 3;         // Optional limit (0 or negative => no limit)
}

message Incumbent {
  int64 index = 1;
  double objective = 2;
  repeated double assignment = 3;
  string job_id = 4;
}

message IncumbentResponse {
  repeated Incumbent incumbents = 1;
  int64 next_index = 2;        // Next index the client should request
  bool job_complete = 3;       // True if job is complete (no more incumbents)
}

// =============================================================================
// Notes on gRPC Status Codes
// =============================================================================
//
// gRPC uses standard status codes instead of custom ResponseStatus enum:
//   OK (0) - Success
//   CANCELLED (1) - Operation was cancelled
//   UNKNOWN (2) - Unknown error
//   INVALID_ARGUMENT (3) - Invalid request
//   DEADLINE_EXCEEDED (4) - Timeout
//   NOT_FOUND (5) - Job ID not found
//   ALREADY_EXISTS (6) - Job already exists
//   RESOURCE_EXHAUSTED (8) - Queue full, out of memory, etc.
//   INTERNAL (13) - Internal server error
//   UNAVAILABLE (14) - Server unavailable
//
// Errors are returned via gRPC Status with a message, not in response message.
